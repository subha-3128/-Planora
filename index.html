<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#6366f1">
    <meta name="description" content="A modern PWA for managing your weekly timetable and productivity">
    
    <title>Planora - Your Productivity Companion</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class'
        }
    </script>
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/style.css">
    
    <!-- Manifest for PWA -->
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%236366f1' width='180' height='180'/><text x='50%' y='50%' font-size='90' font-weight='bold' fill='white' text-anchor='middle' dominant-baseline='central'>⏰</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%236366f1' width='180' height='180'/><text x='50%' y='50%' font-size='90' font-weight='bold' fill='white' text-anchor='middle' dominant-baseline='central'>⏰</text></svg>">
</head>
<body class="app-shell text-gray-900 dark:text-gray-100 transition-colors duration-300">
    <div class="bg-orb orb-one" aria-hidden="true"></div>
    <div class="bg-orb orb-two" aria-hidden="true"></div>
    <div class="bg-orb orb-three" aria-hidden="true"></div>
    
    <!-- Navigation Header -->
    <header class="sticky top-0 z-50 glass-header border-b border-gray-200 dark:border-gray-800 shadow-sm backdrop-blur-md bg-opacity-95 dark:bg-opacity-95">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="text-3xl">⏰</div>
                    <h1 class="text-2xl font-bold site-title">Planora</h1>
                </div>
                
                <div class="flex items-center gap-4">
                    <button id="resetBtn" class="glass-btn glass-btn-warm px-4 py-2 text-sm font-medium rounded-lg transition-all duration-300" title="Reset all tasks for this week">
                        ↺ Reset Week
                    </button>
                    
                    <button id="settingsBtn" class="glass-btn-dark-toggle px-2.5 py-2 rounded-lg transition-all duration-300 hidden sm:block" title="Open settings">
                        <span class="text-lg">⚙️</span>
                    </button>
                    
                    <button id="darkModeToggle" class="glass-btn-dark-toggle px-2.5 py-2 rounded-lg transition-all duration-300" title="Toggle dark mode">
                        <span class="text-lg">🌙</span>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Container -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <!-- Stats Section -->
        <div class="md:hidden mb-4">
            <button id="statsToggleBtn" class="w-full glass-card px-4 py-3 rounded-xl text-left font-semibold text-gray-800 dark:text-gray-100 shadow-sm">
                ▼ Weekly Stats
            </button>
        </div>

        <div id="statsSection" data-reveal class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-10">
            <div class="glass-card stat-card rounded-2xl p-6 shadow-sm hover:shadow-md transition-shadow">
                <p class="text-gray-600 dark:text-gray-400 text-sm font-medium mb-2">Weekly Progress</p>
                <p class="text-3xl font-bold text-indigo-600" id="weeklyProgress">0%</p>
                <div class="mt-3 w-full bg-gray-200 dark:bg-gray-800 rounded-full h-2">
                    <div id="weeklyProgressBar" class="bg-gradient-to-r from-slate-600 to-sky-700 h-2 rounded-full transition-all duration-500" style="width: 0%"></div>
                </div>
            </div>
            
            <div class="glass-card stat-card rounded-2xl p-6 shadow-sm hover:shadow-md transition-shadow">
                <p class="text-gray-600 dark:text-gray-400 text-sm font-medium mb-2">Tasks Completed</p>
                <p class="text-3xl font-bold text-green-600" id="tasksCompleted">0/0</p>
                <p class="text-sm text-gray-500 dark:text-gray-400 mt-2">Across all days</p>
            </div>
            
            <div class="glass-card stat-card rounded-2xl p-6 shadow-sm hover:shadow-md transition-shadow">
                <p class="text-gray-600 dark:text-gray-400 text-sm font-medium mb-2">Current Streak</p>
                <p class="text-3xl font-bold text-orange-600" id="streak">0 days 🔥</p>
                <p class="text-sm text-gray-500 dark:text-gray-400 mt-2">Keep it going!</p>
            </div>
        </div>

        <!-- Days List and Routine View -->
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            
            <!-- Sidebar: Days List -->
            <div class="lg:col-span-1">
                <div id="daysPanel" data-reveal class="glass-card rounded-2xl p-4 shadow-sm sticky top-24">
                    <h2 class="text-lg font-bold mb-1 text-gray-900 dark:text-white">📅 All Days</h2>
                    <p class="text-xs text-gray-500 dark:text-gray-400 mb-4">Use Left/Right arrow keys to switch day quickly</p>
                    <div id="daysList" class="space-y-2 max-h-96 overflow-y-auto">
                        <!-- Days will be rendered here -->
                    </div>
                </div>
            </div>

            <!-- Main Content: Routine View -->
            <div class="lg:col-span-3">
                <div id="routineView" data-reveal class="glass-card rounded-2xl shadow-sm overflow-hidden">
                    <div id="routineContent" class="p-6 content-swap-in">
                        <div class="text-center py-12 text-gray-500 dark:text-gray-400">
                            <p class="text-lg">👈 Select a day from the list to view its routine</p>
                        </div>
                    </div>
                </div>
            </div>

        </div>

        <!-- Mobile Bottom Navigation Bar -->
        <div class="mobile-nav-bar">
            <div class="mobile-nav-item" id="mobileStatsBtn" title="Weekly Stats">
                <span class="mobile-nav-icon">📊</span>
                <span>Stats</span>
            </div>
            <div class="mobile-nav-item active" id="mobileDaysBtn" title="Days List">
                <span class="mobile-nav-icon">📅</span>
                <span>Days</span>
            </div>
            <div class="mobile-nav-item" id="mobileSettingsBtn" title="Settings">
                <span class="mobile-nav-icon">⚙️</span>
                <span>Settings</span>
            </div>
            <div class="mobile-nav-item" id="mobileInfoBtn" title="About">
                <span class="mobile-nav-icon">ℹ️</span>
                <span>About</span>
            </div>
        </div>

    </main>

    <!-- Settings Modal -->
    <div id="settingsModal" class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden z-50 flex items-end sm:items-center justify-center">
        <div class="bg-white dark:bg-gray-900 rounded-t-3xl sm:rounded-2xl w-full sm:w-full sm:max-w-md p-6 shadow-2xl animation-slide-up">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-gray-900 dark:text-white">⚙️ Settings</h2>
                <button id="closeSettingsBtn" class="text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200 text-2xl">✕</button>
            </div>

            <!-- Notification Settings -->
            <div class="space-y-4">
                <div class="border-b border-gray-200 dark:border-gray-700 pb-4">
                    <h3 class="font-semibold text-gray-900 dark:text-white mb-4">🔔 Notifications</h3>
                    
                    <div class="flex items-center justify-between mb-4">
                        <label class="text-gray-700 dark:text-gray-300">Enable Notifications</label>
                        <input type="checkbox" id="notificationsToggle" class="w-5 h-5">
                    </div>

                    <div id="notificationOptions" class="space-y-3 pl-2 hidden">
                        <div class="flex items-center justify-between">
                            <label class="text-sm text-gray-600 dark:text-gray-400">5 minutes before task</label>
                            <input type="checkbox" id="notify5min" class="w-4 h-4">
                        </div>
                        <div class="flex items-center justify-between">
                            <label class="text-sm text-gray-600 dark:text-gray-400">At task time</label>
                            <input type="checkbox" id="notifyOnTime" class="w-4 h-4">
                        </div>
                        <div class="flex items-center justify-between">
                            <label class="text-sm text-gray-600 dark:text-gray-400">Task completion celebration</label>
                            <input type="checkbox" id="notifyCelebration" class="w-4 h-4">
                        </div>
                    </div>

                    <button id="requestNotificationBtn" class="w-full mt-4 glass-btn glass-btn-primary text-white px-4 py-2 rounded-lg font-medium hidden">
                        Enable Browser Notifications
                    </button>
                </div>

                <!-- Other Settings -->
                <div class="pt-4">
                    <h3 class="font-semibold text-gray-900 dark:text-white mb-4">💾 Data</h3>
                    <button id="exportDataBtn" class="w-full glass-btn px-4 py-2 rounded-lg font-medium text-gray-900 dark:text-gray-100 mb-2">
                        📥 Export Data
                    </button>
                    <button id="clearDataBtn" class="w-full glass-btn px-4 py-2 rounded-lg font-medium text-red-600 dark:text-red-400">
                        🗑️ Clear All Data
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notifications -->
    <div id="toastContainer" class="fixed bottom-6 right-6 space-y-3 pointer-events-none"></div>

    <!-- Scripts -->
    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
    
    <script>
        // Register Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('js/sw.js')
                .then(reg => console.log('✓ Service Worker registered'))
                .catch(err => console.log('✗ Service Worker registration failed:', err));
        }
        
        // PWA Installation
        let deferredPrompt;
        const installBtn = document.getElementById('installBtn');
        
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            if (installBtn) {
                installBtn.classList.remove('hidden');
            }
        });
        
        if (installBtn) {
            installBtn.addEventListener('click', async () => {
                if (deferredPrompt) {
                    deferredPrompt.prompt();
                    const { outcome } = await deferredPrompt.userChoice;
                    console.log(`User response: ${outcome}`);
                    deferredPrompt = null;
                    installBtn.classList.add('hidden');
                }
            });
        }
    </script>

</body>
</html>
